<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamoll — Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0f;
      --bg2:     #111118;
      --bg3:     #1a1a24;
      --border:  #2a2a3a;
      --accent:  #e8ff47;
      --accent2: #47ffe0;
      --text:    #f0f0f8;
      --muted:   #6b6b8a;
      --danger:  #ff4757;
      --radius:  6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── PANTALLAS ── */
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ══════════════ LOGIN ══════════════ */
    #screen-login {
      justify-content: center;
      align-items: center;
      padding: 32px 24px;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, #1a1a30 0%, transparent 70%),
        var(--bg);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      animation: fadeUp .5s ease both;
    }

    .login-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.6rem;
      letter-spacing: -2px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: .68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .95rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      margin-top: 14px;
      padding: 12px 14px;
      background: #2a1018;
      border: 1px solid #5a2030;
      border-radius: var(--radius);
      color: var(--danger);
      font-size: .8rem;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ══════════════ APP ══════════════ */
    #screen-app { background: var(--bg); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-left { display: flex; align-items: center; gap: 20px; }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .topbar-user {
      font-size: .72rem;
      color: var(--muted);
      padding: 4px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 32px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 60px;
      z-index: 9;
    }

    .search-wrap { position: relative; flex: 1; max-width: 480px; }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      padding: 10px 14px 10px 38px;
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent2); }
    .search-input::placeholder { color: var(--muted); }

    .stats {
      font-size: .7rem;
      color: var(--muted);
      white-space: nowrap;
      margin-left: auto;
    }

    .stats span {
      color: var(--accent2);
      font-weight: 500;
    }

    /* ── TABLA ── */
    .table-wrap {
      flex: 1;
      overflow-x: auto;
      padding: 24px 32px 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    thead tr {
      border-bottom: 2px solid var(--border);
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: .65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      cursor: pointer;
      animation: fadeUp .3s ease both;
    }
    tbody tr:hover { background: var(--bg3); }

    tbody td {
      padding: 13px 14px;
      vertical-align: middle;
    }

    .td-nombre {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--text);
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .td-marca { color: var(--muted); }

    .td-codigo {
      font-size: .72rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
      display: inline-block;
    }

    .td-precio {
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }

    .td-bonif {
      color: var(--accent2);
      white-space: nowrap;
    }

    .td-empresa {
      font-size: .75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .td-um {
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── LOADING / EMPTY ── */
    .loading, .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 20px;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: 2px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ══════════════ MODAL DETALLE ══════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      animation: fadeUp .25s ease both;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
    }

    .modal-marca {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .btn-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 1.1rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .2s, color .2s;
    }
    .btn-close:hover { border-color: var(--danger); color: var(--danger); }

    .modal-body { padding: 24px; }

    .precio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .precio-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .precio-box.accent { border-color: #3a3a10; }
    .precio-box.accent2 { border-color: #103a3a; }

    .precio-label {
      font-size: .62rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .precio-value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
    }
    .precio-value.accent2 { color: var(--accent2); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-field {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .detail-field-label {
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .detail-field-value {
      font-size: .88rem;
      color: var(--text);
    }

    .detail-desc {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .detail-desc .detail-field-label { margin-bottom: 8px; }

    .detail-desc-value {
      font-size: .82rem;
      color: var(--text);
      line-height: 1.7;
    }

    .btn-imprimir {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .72rem;
      padding: 7px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity .2s;
    }
    .btn-imprimir:hover { opacity: .85; }

    /* ── ETIQUETA IMPRESIÓN ── */
    @media print {
      body > * { display: none !important; }
      #etiqueta-print { display: flex !important; }
    }

    #etiqueta-print {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: white;
      align-items: center;
      justify-content: center;
    }

    .etiqueta {
      width: 5cm;
      height: 3cm;
      background: white;
      color: black;
      border: 1.5px solid #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3px 5px 4px;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .etiqueta-nombre {
      font-size: 7pt;
      font-weight: bold;
      text-align: center;
      line-height: 1.2;
      max-height: 18pt;
      overflow: hidden;
      width: 100%;
    }

    .etiqueta-marca {
      font-size: 6pt;
      color: #444;
      text-align: center;
      width: 100%;
    }

    .etiqueta-precio {
      font-size: 28pt;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      letter-spacing: -1px;
    }

    .etiqueta-barcode {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .etiqueta-barcode svg {
      width: 100%;
      height: 18pt;
    }

    .etiqueta-codigo-text {
      font-size: 5.5pt;
      letter-spacing: 1px;
      color: #000;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ══════════════ LOGIN ══════════════ -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="login-logo">MAMOLL</div>
      <div class="login-sub">Sistema de productos</div>

      <div class="field">
        <label>Usuario</label>
        <input id="inp-user" type="text" placeholder="tu/usuario" autocomplete="username" autocapitalize="none" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-primary" id="btn-login">INGRESAR</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- ══════════════ APP ══════════════ -->
  <div id="screen-app" class="screen">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">MAMOLL</div>
        <div class="topbar-user" id="topbar-user"></div>
      </div>
      <button class="btn-logout" id="btn-logout">SALIR</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
        <input class="search-input" id="search-input" type="search" placeholder="Buscar por nombre, marca o código..." />
      </div>
      <div class="stats">Total: <span id="stats-count">—</span></div>
    </div>

    <div class="table-wrap">
      <div id="table-container">
        <div class="loading"><div class="spinner"></div>CARGANDO</div>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL ══════════════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-marca" id="modal-marca"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-imprimir" id="btn-imprimir" onclick="imprimirEtiqueta()">🖨 ETIQUETA</button>
          <button class="btn-close" id="btn-close">✕</button>
        </div>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ══════════════ ETIQUETA PRINT ══════════════ -->
  <div id="etiqueta-print">
    <div class="etiqueta" id="etiqueta-contenido"></div>
  </div>

  <script>
    const API = "https://mamoll.com";

    let token    = localStorage.getItem("mamoll_token") || null;
    let username = localStorage.getItem("mamoll_user")  || null;
    let allProductos = [];

    // ── Pantallas ────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // ── LOGIN ─────────────────────────────────────────────
    async function doLogin() {
      const user  = document.getElementById("inp-user").value.trim();
      const pass  = document.getElementById("inp-pass").value;
      const errEl = document.getElementById("login-error");
      const btn   = document.getElementById("btn-login");

      errEl.classList.remove("show");

      if (!user || !pass) {
        errEl.textContent = "Completá usuario y contraseña";
        errEl.classList.add("show");
        return;
      }

      btn.disabled = true;
      btn.textContent = "VERIFICANDO...";

      try {
        const res  = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Credenciales incorrectas";
          errEl.classList.add("show");
          return;
        }

        token    = data.token;
        username = user;
        localStorage.setItem("mamoll_token", token);
        localStorage.setItem("mamoll_user", username);
        enterApp();

      } catch {
        errEl.textContent = "No se pudo conectar al servidor";
        errEl.classList.add("show");
      } finally {
        btn.disabled = false;
        btn.textContent = "INGRESAR";
      }
    }

    document.getElementById("btn-login").addEventListener("click", doLogin);
    document.getElementById("inp-pass").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    // ── ENTRAR APP ────────────────────────────────────────
    function enterApp() {
      document.getElementById("topbar-user").textContent = username;
      showScreen("screen-app");
      loadProductos();
    }

    // ── LOGOUT ───────────────────────────────────────────
    document.getElementById("btn-logout").addEventListener("click", () => {
      token = null; username = null; allProductos = [];
      localStorage.removeItem("mamoll_token");
      localStorage.removeItem("mamoll_user");
      document.getElementById("inp-pass").value = "";
      document.getElementById("login-error").classList.remove("show");
      showScreen("screen-login");
    });

    // ── CARGAR PRODUCTOS ──────────────────────────────────
    async function loadProductos() {
      const container = document.getElementById("table-container");
      container.innerHTML = '<div class="loading"><div class="spinner"></div>CARGANDO</div>';

      try {
        const res = await fetch(`${API}/productos`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem("mamoll_token");
          showScreen("screen-login");
          return;
        }

        const data = await res.json();
        allProductos = Array.isArray(data) ? data : [];
        renderTabla(allProductos);

      } catch {
        container.innerHTML = '<div class="empty">Error al cargar productos</div>';
      }
    }

    // ── RENDER TABLA ──────────────────────────────────────
    function renderTabla(productos) {
      const container = document.getElementById("table-container");
      document.getElementById("stats-count").textContent = productos.length;

      if (productos.length === 0) {
        container.innerHTML = '<div class="empty">Sin resultados</div>';
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombre</th>
              <th>Marca</th>
              <th>Precio</th>
              <th>P. Bonif.</th>
              <th>Unidad</th>
              <th>Empresa / País</th>
            </tr>
          </thead>
          <tbody>
            ${productos.map((p, i) => `
              <tr onclick="showModal(${i})" style="animation-delay:${Math.min(i * 0.02, 0.4)}s">
                <td><span class="td-codigo">${p.codigoBarraProductos || "—"}</span></td>
                <td class="td-nombre">${p.nameProductos || "—"}</td>
                <td class="td-marca">${p.marcaProductos || "—"}</td>
                <td class="td-precio">${fmt(p.priceProductos)}</td>
                <td class="td-bonif">${fmt(p.precioVentaBonificadoFinalProductos)}</td>
                <td class="td-um">${p.unidadDeMedida || "—"}</td>
                <td class="td-empresa">${p.nameEmpresasPaises || ""} ${p.namePaisLista ? "· " + p.namePaisLista : ""}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    // ── BÚSQUEDA ──────────────────────────────────────────
    document.getElementById("search-input").addEventListener("input", function () {
      const q = this.value.toLowerCase().trim();
      if (!q) { renderTabla(allProductos); return; }
      renderTabla(allProductos.filter(p =>
        (p.nameProductos       || "").toLowerCase().includes(q) ||
        (p.marcaProductos      || "").toLowerCase().includes(q) ||
        (p.codigoBarraProductos|| "").toLowerCase().includes(q) ||
        (p.descriptionProductos|| "").toLowerCase().includes(q)
      ));
    });

    // ── MODAL DETALLE ─────────────────────────────────────
    function showModal(i) {
      const p = allProductos[i];
      if (!p) return;
      productoActual = p;

      document.getElementById("modal-title").textContent = p.nameProductos || "—";
      document.getElementById("modal-marca").textContent = p.marcaProductos || "";

      document.getElementById("modal-body").innerHTML = `
        <div class="precio-row">
          <div class="precio-box accent">
            <div class="precio-label">Precio venta</div>
            <div class="precio-value">${fmt(p.priceProductos)}</div>
          </div>
          <div class="precio-box accent2">
            <div class="precio-label">Precio bonificado</div>
            <div class="precio-value accent2">${fmt(p.precioVentaBonificadoFinalProductos)}</div>
          </div>
        </div>

        <div class="detail-grid">
          <div class="detail-field">
            <div class="detail-field-label">Código barra</div>
            <div class="detail-field-value">${p.codigoBarraProductos || "—"}</div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Unidad medida</div>
            <div class="detail-field-value">${p.unidadDeMedida || "—"}</div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Costo</div>
            <div class="detail-field-value">${fmt(p.costeProductos)}</div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Margen</div>
            <div class="detail-field-value">${p.margenVentaUtilidadProductos != null ? p.margenVentaUtilidadProductos + "%" : "—"}</div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Empresa</div>
            <div class="detail-field-value">${p.nameEmpresasPaises || "—"}</div>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">País</div>
            <div class="detail-field-value">${p.namePaisLista || "—"}</div>
          </div>
        </div>

        ${p.descriptionProductos ? `
        <div class="detail-desc">
          <div class="detail-field-label">Descripción</div>
          <div class="detail-desc-value">${p.descriptionProductos}</div>
        </div>` : ""}
      `;

      document.getElementById("modal-overlay").classList.add("show");
    }

    document.getElementById("btn-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modal-overlay")) closeModal();
    });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("show");
    }

    // ── IMPRIMIR ETIQUETA ─────────────────────────────────
    let productoActual = null;

    function imprimirEtiqueta() {
      if (!productoActual) return;
      const p = productoActual;

      const nombre  = (p.nameProductos || "").toUpperCase();
      const marca   = (p.marcaProductos || "").toUpperCase();
      const precio  = fmtNum(p.priceProductos);
      const codigo  = p.codigoBarraProductos || "";

      document.getElementById("etiqueta-contenido").innerHTML = `
        <div class="etiqueta-nombre">${nombre}</div>
        <div class="etiqueta-marca">${marca}</div>
        <div class="etiqueta-precio">$${precio}</div>
        <div class="etiqueta-barcode">
          ${codigo ? generarBarcode(codigo) : ""}
          <div class="etiqueta-codigo-text">${codigo}</div>
        </div>
      `;

      document.getElementById("etiqueta-print").style.display = "flex";
      setTimeout(() => {
        window.print();
        document.getElementById("etiqueta-print").style.display = "none";
      }, 200);
    }

    // Generador de código de barras Code128 simplificado en SVG
    function generarBarcode(texto) {
      // Barras decorativas basadas en el texto (representación visual)
      const chars = texto.split("");
      let barras = "10110010"; // start
      chars.forEach(c => {
        const code = c.charCodeAt(0);
        barras += (code).toString(2).padStart(8, "0");
      });
      barras += "1100011101011"; // stop

      const anchoBar = 1.2;
      let x = 0;
      let svgBars = "";
      for (let i = 0; i < barras.length; i++) {
        if (barras[i] === "1") {
          svgBars += `<rect x="${x.toFixed(1)}" y="0" width="${anchoBar}" height="100%" fill="black"/>`;
        }
        x += anchoBar;
      }
      const totalAncho = x;
      return `<svg viewBox="0 0 ${totalAncho} 20" preserveAspectRatio="none">${svgBars}</svg>`;
    }

    function fmtNum(val) {
      if (val == null || val === "") return "—";
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      return n.toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    // ── HELPERS ──────────────────────────────────────────
    function fmt(val) {
      if (val == null || val === "") return "—";
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      return "$" + n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ── INIT ─────────────────────────────────────────────
    if (token && username) enterApp();
  </script>
</body>
</html>
