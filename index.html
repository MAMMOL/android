<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #00ff88;
      --accent2:  #0066ff;
      --text:     #e8e8e8;
      --muted:    #666;
      --danger:   #ff4455;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #000;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      background: var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.green  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.red    { background: var(--danger); }
    .dot.blue   { background: var(--accent2); }

    /* Status bar */
    #status-bar {
      padding: 0.75rem 1.1rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* Sidebar tablas */
    #tabla-list {
      list-style: none;
      padding: 0.5rem 0;
      max-height: 400px;
      overflow-y: auto;
    }

    #tabla-list li {
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    #tabla-list li:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    #tabla-list li.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0,255,136,0.05);
    }

    /* Tabla de datos */
    .table-wrap {
      overflow-x: auto;
      max-height: 500px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1e1e1e;
      padding: 0.65rem 1rem;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      padding: 0.6rem 1rem;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      white-space: nowrap;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .null-val { color: var(--muted); font-style: italic; }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #333 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      height: 14px;
      margin: 0.4rem 0;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-box {
      padding: 1.5rem;
      color: var(--danger);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .actions {
      padding: 0.85rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .row-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      body  { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">DB</div>
  <h1>PostgreSQL Explorer</h1>
  <span class="tag" id="db-tag">185.139.1.178</span>
</header>

<div id="app">
  <!-- Estado inicial: cargando -->
  <div class="panel" style="padding:2rem; text-align:center; color:var(--muted);">
    <div class="skeleton" style="width:60%;margin:0 auto 0.5rem;"></div>
    <div class="skeleton" style="width:40%;margin:0 auto;"></div>
    <p style="margin-top:1.5rem;font-size:0.85rem;">Conectando a la base de datos…</p>
  </div>
</div>

<script>
  const API = '/api/datos';

  let state = {
    tablas: [],
    tablaActiva: null,
    datos: null,
    loading: true,
    error: null,
  };

  async function init() {
    try {
      const r = await fetch(API);
      const json = await r.json();

      if (!json.success) {
        state.error = json.error + (json.ayuda ? '\n→ ' + json.ayuda : '');
        state.loading = false;
        render();
        return;
      }

      state.tablas = json.tablas_encontradas || [];
      state.loading = false;

      if (json.muestra) {
        state.tablaActiva = json.muestra.tabla;
        state.datos = json.muestra;
      }

      render();
    } catch (e) {
      state.error = 'No se pudo conectar con la API.\n' + e.message;
      state.loading = false;
      render();
    }
  }

  async function cargarTabla(nombre) {
    state.tablaActiva = nombre;
    state.datos = null;
    render();

    try {
      const r = await fetch(`${API}?tabla=${encodeURIComponent(nombre)}`);
      const json = await r.json();
      if (json.success && json.muestra) {
        state.datos = json.muestra;
      } else {
        state.datos = { error: json.error };
      }
    } catch (e) {
      state.datos = { error: e.message };
    }
    render();
  }

  function render() {
    const app = document.getElementById('app');

    if (state.error) {
      app.innerHTML = `
        <div class="panel">
          <div class="panel-header"><span class="dot red"></span> Error de conexión</div>
          <div class="error-box">${state.error.replace(/\n/g,'<br>')}</div>
        </div>`;
      return;
    }

    const sidebar = `
      <div class="panel">
        <div class="panel-header"><span class="dot green"></span> Tablas (${state.tablas.length})</div>
        <ul id="tabla-list">
          ${state.tablas.length === 0
            ? '<li style="color:var(--muted);cursor:default">Sin tablas</li>'
            : state.tablas.map(t => `
                <li class="${t === state.tablaActiva ? 'active' : ''}"
                    onclick="cargarTabla('${t}')">
                  📋 ${t}
                </li>`).join('')
          }
        </ul>
      </div>`;

    let mainContent;

    if (!state.tablaActiva) {
      mainContent = `<div class="panel"><div class="empty">Seleccioná una tabla para ver sus datos</div></div>`;
    } else if (!state.datos) {
      mainContent = `
        <div class="panel">
          <div class="panel-header"><span class="dot blue"></span> ${state.tablaActiva}</div>
          <div style="padding:1.5rem">
            ${[1,2,3,4,5].map(() => `<div class="skeleton" style="width:${70+Math.random()*25|0}%"></div>`).join('')}
          </div>
        </div>`;
    } else if (state.datos.error) {
      mainContent = `
        <div class="panel">
          <div class="panel-header"><span class="dot red"></span> ${state.tablaActiva}</div>
          <div class="error-box">${state.datos.error}</div>
        </div>`;
    } else {
      const { columnas, filas, total_filas } = state.datos;
      const thead = columnas.map(c => `<th>${c}</th>`).join('');
      const tbody = filas.map(fila =>
        `<tr>${columnas.map(c => {
          const v = fila[c];
          if (v === null || v === undefined)
            return `<td><span class="null-val">null</span></td>`;
          return `<td title="${String(v).replace(/"/g,'&quot;')}">${String(v)}</td>`;
        }).join('')}</tr>`
      ).join('');

      mainContent = `
        <div class="panel">
          <div class="panel-header"><span class="dot green"></span> ${state.tablaActiva}</div>
          <div class="table-wrap">
            <table>
              <thead><tr>${thead}</tr></thead>
              <tbody>${tbody || '<tr><td colspan="${columnas.length}" style="text-align:center;color:var(--muted);padding:2rem">Sin registros</td></tr>'}</tbody>
            </table>
          </div>
          <div class="actions">
            <button class="btn" onclick="cargarTabla('${state.tablaActiva}')">↺ Refrescar</button>
            <span class="row-count">${total_filas} fila${total_filas !== 1 ? 's' : ''} (máx 10)</span>
          </div>
        </div>`;
    }

    app.innerHTML = `<div class="grid">${sidebar}${mainContent}</div>`;
  }

  init();
</script>
</body>
</html>
